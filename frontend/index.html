<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Code Kanban</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Code Kanban</h1>
    <div class="topbar-controls">
      <label class="field">
        <span>Project</span>
        <select id="project-select" title="Project"></select>
      </label>
      <button id="new-task-btn" type="button" disabled>New task</button>
      <button id="new-epic-btn" type="button" disabled>New epic</button>
      <button id="refresh-btn" type="button" disabled>Refresh</button>
    </div>
  </header>

  <p id="status" class="status" role="status" aria-live="polite"></p>

  <main>
    <section id="board" class="board" aria-label="Board"></section>
    <section id="epics" class="epics" aria-label="Epics"></section>
  </main>

  <!-- Card detail + edit overlay -->
  <div id="detail-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Card detail">
    <div class="overlay-card">
      <button class="overlay-close" type="button" aria-label="Close">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <!-- New task / new epic forms are rendered into this overlay by app.js -->
  <div id="form-overlay" class="overlay hidden" role="dialog" aria-modal="true"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
